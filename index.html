<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Jiho Jung — Coming soon</title><meta name="robots" content="noindex"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/><style>
:root{--bg:#F4F3F0;--ink:#161512;--muted:#7d7a72;--faint:#a9a59c;--line:rgba(22,21,18,0.12);--accent:#A8512E;--font:"Inter",system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;word-break:keep-all;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px}
.card{max-width:540px;width:100%;text-align:left}
.brand{font-size:15px;font-weight:600;letter-spacing:-.01em}
.role{margin-top:4px;font-size:13px;color:var(--muted)}
.eyebrow{margin-top:56px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
h1{margin-top:18px;font-weight:700;letter-spacing:-.03em;line-height:1.1;font-size:clamp(34px,7vw,52px)}
p.lead{margin-top:22px;font-size:17px;line-height:1.6;color:var(--muted);max-width:42ch}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:9px;vertical-align:middle;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.foot{margin-top:56px;padding-top:22px;border-top:1px solid var(--line);font-size:13px;color:var(--faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
.foot a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--accent);padding-bottom:2px}
.foot a:hover{color:var(--ink)}
@media(prefers-reduced-motion:reduce){.dot{animation:none}}
</style></head><body>
<main class="card">
<div class="brand">Jiho Jung</div>
<div class="role">Retail &amp; Channel Ops · APAC</div>
<div class="eyebrow"><span class="dot"></span>Coming soon</div>
<h1>Putting on something better.</h1>
<p class="lead">This site is being rebuilt right now. New portfolio and writing are on the way — please check back shortly.</p>
<p class="lead" style="margin-top:10px">사이트를 새로 단장하고 있습니다. 곧 다시 찾아주세요.</p>
<div class="foot"><span>&copy; 2026 Jiho Jung</span><a href="mailto:jjung677@gmail.com">jjung677@gmail.com</a></div>
</main>
</body></html>
